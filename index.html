    <style>
        /* CSS */
        .typing {
          overflow: hidden; /* Hide overflowing text */
          white-space: nowrap; /* Prevent line breaks */
        }
    
        .typing:after {
          content: "|";
          margin-left: 2px;
          opacity: 1;
          animation: blink-caret 0.75s infinite;
        }
    
        @keyframes blink-caret {
          from, to {
            opacity: 1;
          }
          50% {
            opacity: 0;
          }
        }
      </style>
</head>
